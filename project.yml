name: TimberVox
options:
  bundleIdPrefix: com.chiejimofor
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: XM69J99HWP
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ALWAYS_SEARCH_USER_PATHS: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      ONLY_ACTIVE_ARCH: YES
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      EMIT_FRONTEND_COMMAND_LINES: YES
      OTHER_LDFLAGS:
        - "$(inherited)"
        - "-Xlinker"
        - "-interposable"
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      ENABLE_NS_ASSERTIONS: NO

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.43.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: "0.15.5"

targets:
  TimberVox:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/PeacockeryVoice.xcconfig
      Release: Config/PeacockeryVoice.xcconfig
    sources:
      - path: TimberVox
        excludes:
          - "TimberVox.entitlements"
          - "TimberVoxDebug.entitlements"
    dependencies:
      - package: GRDB
      - package: KeyboardShortcuts
      - package: RevenueCat
      - package: FluidAudio
    info:
      path: TimberVox/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: "public.app-category.productivity"
        LSUIElement: false
        NSHumanReadableCopyright: "© 2026 Weigh Anchor"
        NSMicrophoneUsageDescription: "TimberVox records your microphone while you dictate."
        NSAudioCaptureUsageDescription: "TimberVox records system audio when you enable it for a dictation mode."
        RevenueCatAPIKey: "$(REVENUECAT_API_KEY)"
        PeacockeryVoiceAPIKey: "$(PEACOCKERY_VOICE_API_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox
        PRODUCT_NAME: TimberVox
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 87
        ENABLE_PREVIEWS: NO
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: TimberVox/TimberVoxDebug.entitlements
          ENABLE_APP_SANDBOX: NO
          ENABLE_HARDENED_RUNTIME: NO
          REVENUECAT_API_KEY: test_zgewzHuIBEYvhqKPPFpeubZVUcY
        Release:
          CODE_SIGN_ENTITLEMENTS: TimberVox/TimberVox.entitlements
          ENABLE_APP_SANDBOX: YES
          REVENUECAT_API_KEY: appl_RHctMSgoSTBwUicmLtZNEdyYJHq

  TimberVoxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TimberVoxTests
    dependencies:
      - target: TimberVox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox.tests
        GENERATE_INFOPLIST_FILE: YES

  TimberVoxUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: TimberVoxUITests
    dependencies:
      - target: TimberVox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox.ui-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: TimberVox

schemes:
  TimberVox:
    build:
      targets:
        TimberVox: all
        TimberVoxTests: [test]
    test:
      targets:
        - TimberVoxTests
      commandLineArguments:
        "--skip-onboarding": true
      environmentVariables:
        TIMBERVOX_TEST_HOST: "1"
    run:
      config: Debug
      commandLineArguments:
        "--skip-onboarding": true
  TimberVoxNavigationPerformance:
    build:
      targets:
        TimberVox: all
        TimberVoxUITests: [test]
    test:
      targets:
        - TimberVoxUITests
      commandLineArguments:
        "--skip-onboarding": true
