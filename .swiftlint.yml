# SwiftLint configuration for toy-local
strict: true

disabled_rules:
  - trailing_whitespace
  - identifier_name
  - type_name

opt_in_rules:
  # Crash prevention (high priority)
  - force_unwrapping
  - implicitly_unwrapped_optional
  - unowned_variable_capture
  - fatal_error_message
  # Code quality
  - empty_count
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_string
  - first_where
  - last_where
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Crash-risk rules — flag prominently
force_cast:
  severity: error
force_try:
  severity: error
force_unwrapping:
  severity: error
implicitly_unwrapped_optional:
  severity: error

excluded:
  - build
  - .build
  - SourcePackages
  - DerivedData
  - .swiftpm
  - toy-local.xcodeproj
  - ToyLocalTests
  - ToyLocalCore/.build
  - _archive

line_length:
  warning: 150
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 200

file_length:
  warning: 500
  error: 1200

type_body_length:
  warning: 300
  error: 600

large_tuple:
  warning: 3
  error: 4

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 15
  error: 50

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

custom_rules:
  unsafe_array_subscript_binding:
    name: "Unsafe Array Subscript in Binding"
    regex: "return \\$\\w+\\.\\w+\\.\\w+\\[\\w+\\]"
    message: "Index-based bindings can crash when array mutates. Use ID-based Binding(get:set:) instead."
    severity: error
